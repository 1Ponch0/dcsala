<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>DC Šaľa – Slim JSON Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; min-height: 100vh; }
  h1 { color: #00d4ff; margin-bottom: 4px; font-size: 1.2rem; }
  p.sub { color: #666; font-size: 0.78rem; margin-bottom: 16px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
  label { font-size: 0.72rem; color: #888; display: block; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
  textarea { width: 100%; background: #0a1628; border: 1px solid #1a4a8a; color: #e0e0e0; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 0.78rem; resize: vertical; }
  input[type=text], input[type=number] {
    background: #0a1628; border: 1px solid #1a4a8a; color: #e0e0e0;
    padding: 8px 10px; border-radius: 5px; font-family: monospace; font-size: 0.82rem;
  }
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
  .row .field { display: flex; flex-direction: column; gap: 4px; }
  .btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-family: monospace; font-size: 0.82rem; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .primary  { background: #00d4ff; color: #1a1a2e; font-weight: bold; }
  .secondary{ background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a; }
  .green    { background: #00b894; color: #fff; font-weight: bold; font-size: 1rem; padding: 12px 24px; }
  .bar-bg { background: #0a1628; border-radius: 4px; height: 8px; overflow: hidden; margin: 8px 0 4px; }
  .bar    { background: #00d4ff; height: 100%; width: 0; transition: width .25s; border-radius: 4px; }
  .ptext  { font-size: 0.72rem; color: #888; }
  .log    { margin-top: 8px; max-height: 160px; overflow-y: auto; font-size: 0.73rem; }
  .log div { padding: 1px 0; }
  .ok   { color: #00b894; }
  .err  { color: #ff6b6b; }
  .warn { color: #fdcb6e; }
  .hint { font-size: 0.7rem; color: #555; margin-top: 5px; }
  .filename-preview { font-size: 0.78rem; color: #00b894; margin-top: 4px; margin-bottom: 10px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
  .stat { background: #0a1628; border-radius: 4px; padding: 7px 12px; font-size: 0.78rem; }
  .stat span { color: #00d4ff; font-weight: bold; }
  .code-block {
    background: #0a1628; border: 1px solid #1a4a8a; border-radius: 5px;
    padding: 10px; font-size: 0.75rem; color: #aad4ff; margin-top: 8px;
    white-space: pre-wrap; word-break: break-all;
  }
  #result-section { display: none; margin-top: 16px; border-top: 1px solid #0f3460; padding-top: 16px; }
  #progress-section { display: none; margin-top: 16px; border-top: 1px solid #0f3460; padding-top: 16px; }
</style>
</head>
<body>

<h1>🎯 DC Šaľa – Slim JSON Builder</h1>
<p class="sub">Vlož linky na kolá → stiahni seasonXX_slim.json</p>

<div class="card">
  <!-- Číslo sezóny -->
  <div class="row">
    <div class="field">
      <label>Číslo sezóny</label>
      <input type="number" id="seasonNum" value="16" min="1" max="99" style="width:80px" oninput="updateFilename()">
    </div>
    <div class="field" style="flex:1">
      <label>Suffix (voliteľný)</label>
      <input type="text" id="seasonSuffix" placeholder="napr. open  alebo  nechaj prázdne" style="width:100%" oninput="updateFilename()">
    </div>
  </div>
  <div class="filename-preview" id="fnPreview">📄 Súbor: season16_slim.json</div>

  <!-- Linky -->
  <label>Linky na kolá (1 na riadok)</label>
  <textarea id="ids" rows="8" placeholder="https://n01darts.com/n01/league/season.php?id=t_W5CJ_9466
https://n01darts.com/n01/league/season.php?id=t_r17y_6493
t_96CX_4231"></textarea>
  <p class="hint">Rozpozná: season.php?id= · ?tdid= · bare t_XXX_XXXX</p>

  <!-- Tlačidlá -->
  <div class="btns">
    <button class="btn primary" id="fetchBtn" onclick="startFetch()">⬇ Generovať JSON</button>
    <button class="btn secondary" onclick="document.getElementById('ids').value=''">🗑 Vyčistiť</button>
  </div>

  <!-- Priebeh – priamo v karte -->
  <div id="progress-section">
    <label>Priebeh</label>
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <div class="ptext" id="ptext">0 / 0</div>
    <div class="log" id="log"></div>
  </div>

  <!-- Výsledok – priamo v karte -->
  <div id="result-section">
    <label style="color:#00b894; font-size:0.9rem;">✓ Hotovo!</label>
    <div class="stats" id="stats"></div>
    <div class="btns">
      <button class="btn green" onclick="downloadJSON()">⬇ Stiahnuť <span id="dlLabel">season16_slim.json</span></button>
      <button class="btn secondary" onclick="copyJSON()">📋 Kopírovať</button>
    </div>
    <div style="margin-top:10px">
      <label>Pridaj do data.js → LOCAL_SEASON_FILES</label>
      <div class="code-block" id="dataJsHint"></div>
    </div>
    <div style="margin-top:10px">
      <label>JSON náhľad</label>
      <textarea id="output" rows="8" readonly></textarea>
    </div>
  </div>
</div>

<script>
const API = 'https://api.n01darts.com/n01/tournament/n01_tournament.php?cmd=get_data&tdid=';
let resultData = [];

function getFilename() {
  const num = document.getElementById('seasonNum').value.trim() || '?';
  const suf = document.getElementById('seasonSuffix').value.trim();
  return suf ? 'season' + num + '_' + suf + '_slim.json' : 'season' + num + '_slim.json';
}

function updateFilename() {
  var fn = getFilename();
  document.getElementById('fnPreview').textContent = '📄 Súbor: ' + fn;
  document.getElementById('dlLabel').textContent = fn;
}

function parseTdids() {
  var lines = document.getElementById('ids').value.split(/[\n,]+/).map(function(s) { return s.trim(); }).filter(Boolean);
  var seen = [];
  var set = {};
  lines.forEach(function(l) {
    var m;
    if ((m = l.match(/[?&]id=(t_[A-Za-z0-9_]+)/)))   { if (!set[m[1]]) { set[m[1]] = 1; seen.push(m[1]); } }
    else if ((m = l.match(/tdid=(t_[A-Za-z0-9_]+)/))) { if (!set[m[1]]) { set[m[1]] = 1; seen.push(m[1]); } }
    else if (/^t_[A-Za-z0-9_]+$/.test(l))             { if (!set[l])    { set[l] = 1;    seen.push(l); } }
  });
  return seen;
}

function log(msg, cls) {
  var el = document.getElementById('log');
  var d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setBar(done, total) {
  document.getElementById('bar').style.width = (total ? done / total * 100 : 0) + '%';
  document.getElementById('ptext').textContent = done + ' / ' + total;
}

function toSlim(raw, tdid) {
  var t = raw.tournament || raw;
  return {
    tdid:       t.tdid || tdid,
    title:      t.title || '',
    t_date:     t.t_date || 0,
    s_date:     t.s_date || 0,
    entry_list: (t.entry_list || []).map(function(p) {
      var s = { tpid: p.tpid, name: p.name };
      if (p.sns_type) s.sns_type = p.sns_type;
      if (p.c) s.c = p.c;
      return s;
    }),
    rr_result: raw.rr_result || t.rr_result || {},
    t_result:  raw.t_result  || t.t_result  || {},
  };
}

function fetchOne(tdid) {
  var PROXY = 'https://h2h.dartssala.workers.dev/?url=';
  var targetUrl = API + tdid;
  return fetch(targetUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .catch(function() {
      return fetch(PROXY + encodeURIComponent(targetUrl))
        .then(function(r2) {
          if (!r2.ok) throw new Error('HTTP ' + r2.status + ' (proxy)');
          return r2.json();
        });
    });
}

function delay(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

function showOutput() {
  var fn = getFilename();
  var players = {};
  resultData.forEach(function(r) {
    (r.entry_list || []).forEach(function(p) { players[p.name] = 1; });
  });
  var playerCount = Object.keys(players).length;

  document.getElementById('stats').innerHTML =
    '<div class="stat">Kôl: <span>' + resultData.length + '</span></div>' +
    '<div class="stat">Hráčov: <span>' + playerCount + '</span></div>' +
    '<div class="stat">Veľkosť: <span>~' + Math.round(JSON.stringify(resultData).length / 1024) + ' KB</span></div>';

  document.getElementById('output').value = JSON.stringify(resultData, null, 2);
  document.getElementById('dlLabel').textContent = fn;
  document.getElementById('dataJsHint').textContent = '// v data.js → LOCAL_SEASON_FILES pridaj:\n"jsons/' + fn + '",';
  document.getElementById('result-section').style.display = '';
}

function startFetch() {
  var ids = parseTdids();

  document.getElementById('progress-section').style.display = '';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('log').innerHTML = '';

  if (!ids.length) {
    log('⚠ Žiadne platné ID. Skontroluj formát linkov.', 'err');
    return;
  }

  document.getElementById('fetchBtn').disabled = true;
  resultData = [];
  setBar(0, ids.length);
  log('Spúšťam ' + ids.length + ' kôl...', 'warn');

  var i = 0;
  function next() {
    if (i >= ids.length) {
      resultData.sort(function(a, b) { return a.t_date - b.t_date; });
      document.getElementById('fetchBtn').disabled = false;
      showOutput();
      return;
    }
    var tdid = ids[i];
    log('[' + (i + 1) + '/' + ids.length + '] ' + tdid + '...');
    fetchOne(tdid)
      .then(function(raw) {
        var slim = toSlim(raw, tdid);
        resultData.push(slim);
        log('  ✓ ' + (slim.title || tdid) + ' (' + slim.entry_list.length + ' hráčov)', 'ok');
      })
      .catch(function(e) {
        log('  ✗ ' + tdid + ': ' + e.message, 'err');
      })
      .then(function() {
        setBar(i + 1, ids.length);
        i++;
        setTimeout(next, 250);
      });
  }
  next();
}

function downloadJSON() {
  var blob = new Blob([JSON.stringify(resultData, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = getFilename();
  a.click();
}

function copyJSON() {
  var text = document.getElementById('output').value;
  navigator.clipboard.writeText(text).then(function() { alert('Skopírované!'); });
}
</script>
</body>
</html>
